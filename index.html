<!-- 로또 번호 생성기: 입력 번호 비율 반영 + 나머지 랜덤으로 10세트 출력, 과거 1000회차 당첨 조합 제외 -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로또 번호 생성기</title>
<style>
  :root { --bg:#0f1226; --card:#1b1f3b; --line:#2c3160; --txt:#e8eaf6; --muted:#9aa0c7; --accent:#5b8cff; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:"Malgun Gothic","맑은 고딕",system-ui,sans-serif; background:var(--bg); color:var(--txt); padding:24px; }
  h1 { font-size:clamp(20px, 2.4vw, 32px); margin:0 0 4px; }
  .sub { color:var(--muted); font-size:clamp(13px, 1vw, 16px); margin-bottom:20px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:18px; margin-bottom:18px; }
  .card h2 { font-size:clamp(15px, 1.3vw, 20px); margin:0 0 12px; color:var(--accent); }
  .row { display:flex; align-items:center; gap:8px; margin-bottom:8px; flex-wrap:wrap; }
  .row .label { width:64px; color:var(--muted); font-size:13px; }
  input[type=number] { width:56px; padding:7px; text-align:center; border:1px solid var(--line); border-radius:8px; background:#12152e; color:var(--txt); font-size:14px; }
  input[type=number]::-webkit-inner-spin-button { opacity:.4; }
  /* 입력 칸을 카드 폭에 비례해 균등하게 채움 */
  #inputs .row { display:grid; grid-template-columns:70px repeat(6, 1fr); gap:10px; margin-bottom:10px; }
  #inputs .row .label { width:auto; }
  #inputs input[type=number] { width:100%; padding:clamp(8px, 1vw, 15px) 4px; font-size:clamp(15px, 1.4vw, 22px); }
  .ratio { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .ratio input { width:70px; }
  .ratio .note { color:var(--muted); font-size:13px; }
  button { cursor:pointer; border:none; border-radius:9px; padding:11px 20px; font-size:14px; font-weight:600; }
  .gen { background:var(--accent); color:#fff; }
  .gen:hover { background:#4478f0; }
  .clr { background:transparent; color:var(--muted); border:1px solid var(--line); }
  .err { color:#ff8a8a; font-size:13px; min-height:18px; margin-top:6px; }
  .hist { color:var(--muted); font-size:13px; margin:4px 0 16px; }
  .sets { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:10px; }
  .set { display:flex; align-items:center; gap:8px; background:#12152e; border:1px solid var(--line); border-radius:10px; padding:10px 12px; }
  .set .idx { width:26px; color:var(--muted); font-size:13px; }
  .ball { width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; color:#fff; }
  .ball.from-input { box-shadow:0 0 0 2px #fff, 0 0 0 4px var(--accent); }
  .legend { color:var(--muted); font-size:12px; margin-top:10px; }
</style>
</head>
<body>
  <h1>로또 번호 생성기</h1>
  <p class="sub">입력한 번호를 지정 비율을 최대치로 하여 랜덤 반영하고, 나머지는 1~45 중 입력 번호를 제외한 랜덤 수로 채워 10세트를 만듭니다. 과거 1000회차에 이미 나온 6개 조합은 제외합니다.</p>

  <div class="card">
    <h2>1. 번호 입력 (최대 5줄, 각 줄 6개 · 1~45)</h2>
    <div id="inputs"></div>
    <p class="err" id="inputErr"></p>
  </div>

  <div class="card">
    <h2>2. 반영 비율</h2>
    <div class="ratio">
      <span class="label">입력 반영</span>
      <input type="number" id="percent" min="0" max="100" value="20">
      <span class="note">% (나머지 <b id="restPct">80</b>% 는 랜덤)</span>
      <span class="note">→ 한 세트당 입력에서 최대 <b id="pickCount">1</b>개 랜덤 반영</span>
    </div>
  </div>

  <div class="row">
    <button class="gen" id="genBtn">10세트 생성</button>
    <button class="clr" id="clrBtn">입력 초기화</button>
  </div>
  <p class="hist" id="histStatus">과거 1000회차 당첨 조합 불러오는 중…</p>

  <div class="card" id="resultCard" style="display:none;">
    <h2>생성 결과</h2>
    <div class="sets" id="sets"></div>
    <p class="legend">◎ 빨간색 공 = 입력에서 반영된 번호</p>
  </div>

<script>
// 로또 생성 로직: 입력 풀 구성, 비율을 최대치로 0~최대개 랜덤 반영하고 나머지는 제외 랜덤으로 채움. 과거 1000회차 조합은 제외
const ROWS = 5, PICKS = 6, MIN = 1, MAX = 45;

// 입력 행 6칸 x 5줄 생성
const inputsEl = document.getElementById('inputs');
for (let r = 0; r < ROWS; r++) {
  const row = document.createElement('div');
  row.className = 'row';
  row.innerHTML = `<span class="label">${r + 1}번째</span>`;
  for (let c = 0; c < PICKS; c++) {
    const inp = document.createElement('input');
    inp.type = 'number'; inp.min = MIN; inp.max = MAX;
    inp.dataset.row = r;
    row.appendChild(inp);
  }
  inputsEl.appendChild(row);
}

const percentEl = document.getElementById('percent');
const restPctEl = document.getElementById('restPct');
const pickCountEl = document.getElementById('pickCount');

// 비율에서 한 세트당 입력 반영 개수(반올림) 미리보기
function pickFromInputCount() {
  let p = Number(percentEl.value);
  if (isNaN(p)) p = 0;
  p = Math.max(0, Math.min(100, p));
  return Math.round(PICKS * p / 100);
}
function refreshPreview() {
  let p = Math.max(0, Math.min(100, Number(percentEl.value) || 0));
  restPctEl.textContent = 100 - p;
  pickCountEl.textContent = pickFromInputCount();
}
// 반영 비율을 기기에 저장/복원(다음 실행 때 마지막 값 표시)
const SAVE_KEY = 'lotto_percent';
try { const saved = localStorage.getItem(SAVE_KEY); if (saved !== null && saved !== '') percentEl.value = saved; } catch (e) {}
percentEl.addEventListener('input', () => { try { localStorage.setItem(SAVE_KEY, percentEl.value); } catch (e) {} refreshPreview(); });

// 입력값 읽기 + 검증. 각 줄은 비었거나(무시) 6개 모두 유효(1~45, 줄 내 중복 없음)
function readInput() {
  const errEl = document.getElementById('inputErr');
  errEl.textContent = '';
  const rows = {};
  document.querySelectorAll('#inputs input').forEach(inp => {
    (rows[inp.dataset.row] ||= []).push(inp.value.trim());
  });
  const pool = new Set();
  for (const r of Object.keys(rows)) {
    const vals = rows[r];
    const filled = vals.filter(v => v !== '');
    if (filled.length === 0) continue;
    if (filled.length !== PICKS) { errEl.textContent = `${Number(r) + 1}번째 줄은 6칸을 모두 채우거나 모두 비워주세요.`; return null; }
    const nums = filled.map(Number);
    if (nums.some(n => !Number.isInteger(n) || n < MIN || n > MAX)) { errEl.textContent = `${Number(r) + 1}번째 줄에 1~45 범위를 벗어난 값이 있습니다.`; return null; }
    if (new Set(nums).size !== PICKS) { errEl.textContent = `${Number(r) + 1}번째 줄에 같은 번호가 중복됩니다.`; return null; }
    nums.forEach(n => pool.add(n));
  }
  return [...pool];
}

// 매 실행마다 다른 난수: 시스템 엔트로피 기반 [0, max) 정수
function randInt(max) {
  const buf = new Uint32Array(1);
  crypto.getRandomValues(buf);
  return Math.floor(buf[0] / 4294967296 * max);
}

// n개 랜덤 추출(비복원)
function sample(arr, n) {
  const a = arr.slice();
  const out = [];
  for (let i = 0; i < n && a.length; i++) {
    out.push(a.splice(randInt(a.length), 1)[0]);
  }
  return out;
}

// 과거 당첨 조합 저장소 (정렬된 6개 번호를 "1,2,3,4,5,6" 형태 키로 보관)
const pastKeys = new Set();
function keyOf(nums) { return nums.slice().sort((a, b) => a - b).join(','); }

// 한 세트 생성: 입력에서 k개 + 제외 랜덤에서 (6-k)개. 과거 조합이면 다시 뽑음
function makeSet(pool, k) {
  let all = null;
  for (let attempt = 0; attempt < 300; attempt++) {
    const fromInput = sample(pool, k);
    const excluded = new Set(pool);
    const candidates = [];
    for (let n = MIN; n <= MAX; n++) if (!excluded.has(n)) candidates.push(n);
    const fromRandom = sample(candidates, PICKS - fromInput.length);
    const inputMark = new Set(fromInput);
    all = [...fromInput, ...fromRandom].sort((a, b) => a - b);
    if (!pastKeys.has(all.join(','))) {
      return all.map(n => ({ n, fromInput: inputMark.has(n) }));
    }
  }
  return all.map(n => ({ n, fromInput: false }));
}

// 번호 구간별 색 (실제 로또 공 색 관례)
function ballColor(n) {
  if (n <= 10) return '#fbc400';
  if (n <= 20) return '#69c8f2';
  if (n <= 30) return '#ff7272';
  if (n <= 40) return '#aaaaaa';
  return '#b0d840';
}

document.getElementById('genBtn').addEventListener('click', () => {
  const pool = readInput();
  if (pool === null) return;
  const maxK = Math.min(pickFromInputCount(), pool.length, PICKS);
  const setsEl = document.getElementById('sets');
  setsEl.innerHTML = '';
  for (let i = 0; i < 10; i++) {
    const set = makeSet(pool, randInt(maxK + 1));
    const div = document.createElement('div');
    div.className = 'set';
    div.innerHTML = `<span class="idx">${i + 1}</span>`;
    set.forEach(b => {
      const ball = document.createElement('span');
      ball.className = 'ball' + (b.fromInput ? ' from-input' : '');
      ball.style.background = b.fromInput ? '#e8113c' : ballColor(b.n);
      ball.textContent = b.n;
      div.appendChild(ball);
    });
    setsEl.appendChild(div);
  }
  document.getElementById('resultCard').style.display = 'block';
});

document.getElementById('clrBtn').addEventListener('click', () => {
  document.querySelectorAll('#inputs input').forEach(i => i.value = '');
  document.getElementById('inputErr').textContent = '';
});

// ── 과거 1000회차 당첨번호 실시간 조회 ──
// 공개 미러(smok95.github.io/lotto, CORS 허용)에서 회차별 당첨번호 JSON을 가져옴
function drawUrl(n) { return 'https://smok95.github.io/lotto/results/' + n + '.json'; }
async function fetchNumbers(n) {
  const r = await fetch(drawUrl(n), { cache: 'no-store' });
  if (!r.ok) return null;
  const j = await r.json();
  return (j && Array.isArray(j.numbers) && j.numbers.length === 6) ? j.numbers : null;
}
// 1회차 추첨일(2002-12-07) 기준 오늘까지의 대략 회차
function estimateLatest() {
  const first = Date.UTC(2002, 11, 7);
  return Math.floor((Date.now() - first) / (7 * 24 * 3600 * 1000)) + 1;
}
// 추정값 주변을 양방향 탐색해 실제 최신 회차를 찾음(미러 갱신 지연/기준일 오차 보정)
async function findLatest(start) {
  let cur = null;
  try { cur = await fetchNumbers(start); } catch (e) { return null; }
  if (cur) {
    let n = start;
    for (let up = 0; up < 60; up++) {
      let nx = null; try { nx = await fetchNumbers(n + 1); } catch (e) {}
      if (nx) n++; else break;
    }
    return n;
  }
  let n = start;
  for (let down = 0; down < 80; down++) {
    n--; if (n < 1) return null;
    let d = null; try { d = await fetchNumbers(n); } catch (e) {}
    if (d) return n;
  }
  return null;
}
async function loadHistory() {
  const status = document.getElementById('histStatus');
  let latest = null;
  try { latest = await findLatest(estimateLatest()); } catch (e) { latest = null; }
  if (!latest) { status.textContent = '과거 회차 불러오기 실패 — 중복 제외 없이 생성합니다.'; status.style.color = '#ff8a8a'; return; }
  const nums = [];
  for (let n = latest; n > latest - 1000 && n >= 1; n--) nums.push(n);
  for (let i = 0; i < nums.length; i += 10) {
    const chunk = nums.slice(i, i + 10);
    const res = await Promise.all(chunk.map(n => fetchNumbers(n).catch(() => null)));
    res.forEach(c => { if (c) pastKeys.add(keyOf(c)); });
    status.textContent = `과거 1000회차 당첨 조합 불러오는 중… (${Math.min(i + 10, nums.length)}/${nums.length})`;
  }
  const from = latest - nums.length + 1;
  status.textContent = `과거 ${nums.length}회차(${from}~${latest}회) 반영됨 · 이미 나온 조합 ${pastKeys.size}건 제외`;
  status.style.color = '#9aa0c7';
}

refreshPreview();
loadHistory();
</script>
</body>
</html>
